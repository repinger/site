user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    server_tokens off;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        add_header Content-Security-Policy "default-src 'none'; style-src 'self'; img-src 'self'; form-action 'none'; frame-ancestors 'none'; base-uri 'none'; require-trusted-types-for 'script'; trusted-types 'none'" always;

        root /web;
        index index.html;
        autoindex off;

        error_page 400 401 403 404 405 408 410 411 412 413 414 415 416 417 418 421 422 423 424 426 428 429 431 451 = @bounce_root;

        location @bounce_root {
            return 302 $scheme://$host/;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
